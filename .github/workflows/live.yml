name: Telegram Live Stream

on:
  workflow_dispatch:

jobs:
  restream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Live Stream
        run: |
          ffmpeg -i "https://livecdn-bp-livestream.linewgen.xyz/stream/31/chunks.m3u8?x-sign=5364e2061cc06fc01362d6f66d742ee1&x-time=1773441960&is_vip=false&token=7d00c587c27385d843c6235bb1b64bd9f1e24259" \
          -c:v copy -c:a copy \
          -f flv "rtmps://dc5-1.rtmp.t.me/s/${{ secrets.TELEGRAM_STREAM_KEY }}"
