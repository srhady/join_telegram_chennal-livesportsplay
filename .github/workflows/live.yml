name: Auto TV Channel Stream

on:
  workflow_dispatch:
    inputs:
      match_number:
        description: 'কত নম্বর লিংকটি লাইভ করতে চান? (২ = প্রথম ম্যাচ, ৩ = ২য় ম্যাচ)'
        required: true
        default: '2'
  schedule:
    - cron: '0 0 * * *'
    - cron: '15 6 * * *'
    - cron: '30 12 * * *'
    - cron: '45 18 * * *'

concurrency:
  group: "telegram-stream"
  cancel-in-progress: true

jobs:
  restream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg & Curl
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Smart Streamer Background Checker
        env:
          MATCH_NUM_INPUT: ${{ github.event.inputs.match_number }}
        run: |
          MATCH_NUM=${MATCH_NUM_INPUT:-2}
          PLAYLIST_URL="https://raw.githubusercontent.com/srhady/bingstream/main/playlist.m3u"
          
          while true; do
            echo "প্লেলিস্ট চেক করা হচ্ছে..."
            curl -s "$PLAYLIST_URL" > playlist.m3u
            
            grep -v '^#' playlist.m3u | grep -v '^\s*$' > urls.txt
            URL_COUNT=$(wc -l < urls.txt)
            
            if [ "$URL_COUNT" -eq 0 ]; then
              echo "প্লেলিস্টে কোনো লিংক পাওয়া যায়নি! ১৫ সেকেন্ড পর আবার চেক করা হবে..."
              sleep 15
              continue
            fi
            
            if [ "$URL_COUNT" -eq 1 ]; then
              echo "শুধুমাত্র ইনট্রো ভিডিও পাওয়া গেছে। ইনট্রো প্লে করা হচ্ছে..."
              STREAM_URL=$(sed -n '1p' urls.txt)
              
              # বাফারিং এবং সিঙ্ক ফিক্স করা হয়েছে
              ffmpeg -use_wallclock_as_timestamps 1 -thread_queue_size 512 -nostdin -re -i "$STREAM_URL" \
              -map 0:v:0 -map 0:a:0 -c:v copy -c:a aac -b:a 128k -ar 44100 \
              -max_muxing_queue_size 1024 -f flv "rtmps://dc5-1.rtmp.t.me/s/${{ secrets.TELEGRAM_STREAM_KEY }}" &
              
              FFMPEG_PID=$!
              
              while kill -0 $FFMPEG_PID 2>/dev/null; do
                sleep 60
                curl -s "$PLAYLIST_URL" > temp_playlist.m3u
                grep -v '^#' temp_playlist.m3u | grep -v '^\s*$' > temp_urls.txt
                NEW_URL_COUNT=$(wc -l < temp_urls.txt)
                
                if [ "$NEW_URL_COUNT" -gt 1 ]; then
                  echo "নতুন লাইভ ম্যাচ পাওয়া গেছে! ইনট্রো বন্ধ করে ম্যাচ শুরু করা হচ্ছে..."
                  kill -15 $FFMPEG_PID 2>/dev/null
                  break
                fi
              done
              
              sleep 5
              
            else
              echo "লাইভ ম্যাচ পাওয়া গেছে! $MATCH_NUM নম্বর লিংকটি স্ট্রিম শুরু হচ্ছে..."
              
              STREAM_URL=$(sed -n "${MATCH_NUM}p" urls.txt)
              
              if [ -z "$STREAM_URL" ]; then
                 STREAM_URL=$(sed -n '2p' urls.txt)
              fi
              
              BASE_URL=$(echo "$STREAM_URL" | cut -d'?' -f1)
              
              # বাফারিং এবং সিঙ্ক ফিক্স করা হয়েছে
              ffmpeg -use_wallclock_as_timestamps 1 -thread_queue_size 512 -nostdin -i "$STREAM_URL" \
              -map 0:v:0 -map 0:a:0 -c:v copy -c:a aac -b:a 128k -ar 44100 \
              -max_muxing_queue_size 1024 -f flv "rtmps://dc5-1.rtmp.t.me/s/${{ secrets.TELEGRAM_STREAM_KEY }}" &
              
              FFMPEG_PID=$!
              
              while kill -0 $FFMPEG_PID 2>/dev/null; do
                sleep 60
                curl -s "$PLAYLIST_URL" > temp_playlist.m3u
                grep -v '^#' temp_playlist.m3u | grep -v '^\s*$' > temp_urls.txt
                
                if ! grep -Fq "$BASE_URL" temp_urls.txt; then
                  echo "ম্যাচটি প্লেলিস্ট থেকে রিমুভ হয়ে গেছে! স্ট্রিম বন্ধ করে নতুন চেক শুরু হচ্ছে..."
                  kill -15 $FFMPEG_PID 2>/dev/null
                  break
                fi
              done
              
              sleep 5
            fi
          done
