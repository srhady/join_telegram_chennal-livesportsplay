name: Auto TV Channel Stream

on:
  workflow_dispatch:
    inputs:
      match_number:
        description: 'কত নম্বর লিংকটি লাইভ করতে চান? (২ = প্রথম ম্যাচ, ৩ = ২য় ম্যাচ)'
        required: true
        default: '2'
  schedule:
    - cron: '0 0 * * *'
    - cron: '15 6 * * *'
    - cron: '30 12 * * *'
    - cron: '45 18 * * *'

# এই অংশটি একসাথে ২টা স্ট্রিম চলা ঠেকাবে
concurrency:
  group: "telegram-stream"
  cancel-in-progress: true

jobs:
  restream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg & Curl
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Smart Streamer (Intro & Live Match)
        env:
          MATCH_NUM_INPUT: ${{ github.event.inputs.match_number }}
        run: |
          MATCH_NUM=${MATCH_NUM_INPUT:-2}
          
          PLAYLIST_URL="https://raw.githubusercontent.com/srhady/bingstream/main/playlist.m3u"
          
          while true; do
            echo "প্লেলিস্ট চেক করা হচ্ছে..."
            curl -s "$PLAYLIST_URL" > playlist.m3u
            
            # কমেন্ট (#) ছাড়া শুধু লিংকগুলো আলাদা করে urls.txt ফাইলে সেভ করা
            grep -v '^#' playlist.m3u | grep -v '^\s*$' > urls.txt
            URL_COUNT=$(wc -l < urls.txt)
            
            if [ "$URL_COUNT" -eq 0 ]; then
              echo "প্লেলিস্টে কোনো লিংক পাওয়া যায়নি! ১৫ সেকেন্ড পর আবার চেক করা হবে..."
              sleep 15
              continue
            fi
            
            if [ "$URL_COUNT" -eq 1 ]; then
              echo "শুধুমাত্র ইনট্রো ভিডিও পাওয়া গেছে। ইনট্রো প্লে করা হচ্ছে..."
              STREAM_URL=$(sed -n '1p' urls.txt)
              
              timeout 300 ffmpeg -re -i "$STREAM_URL" -c:v copy -c:a copy -f flv "rtmps://dc5-1.rtmp.t.me/s/${{ secrets.TELEGRAM_STREAM_KEY }}" || true
              sleep 5
              
            else
              echo "লাইভ ম্যাচ পাওয়া গেছে! $MATCH_NUM নম্বর লিংকটি স্ট্রিম শুরু হচ্ছে..."
              
              STREAM_URL=$(sed -n "${MATCH_NUM}p" urls.txt)
              
              if [ -z "$STREAM_URL" ]; then
                 echo "আপনার দেওয়া $MATCH_NUM নম্বরে কোনো ম্যাচ নেই! তাই ডিফল্ট ২ নম্বর ম্যাচটি প্লে করা হচ্ছে..."
                 STREAM_URL=$(sed -n '2p' urls.txt)
              fi
              
              ffmpeg -i "$STREAM_URL" -c:v copy -c:a copy -f flv "rtmps://dc5-1.rtmp.t.me/s/${{ secrets.TELEGRAM_STREAM_KEY }}" || true
              sleep 5
            fi
          done
