name: Simple Telegram Stream

on:
  workflow_dispatch:

jobs:
  restream:
    runs-on: ubuntu-latest

    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Live Stream
        run: |
          ffmpeg -i "https://livecdn-bp-livestream.linewgen.xyz/stream/24/chunks.m3u8?x-sign=c1b4b0257a5ec74a42802f19402f297e&x-time=1773484260&is_vip=false&token=1e9688b2d53b94574e2f1e17c144423336b785b1" \
          -c:v copy -c:a copy -bsf:a aac_adtstoasc \
          -max_muxing_queue_size 1024 \
          -f flv "rtmps://dc5-1.rtmp.t.me/s/${{ secrets.TELEGRAM_STREAM_KEY }}"
              
              sleep 5
            fi
          done
