name: Auto Scraper

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর (00:00, 06:00, 12:00, 18:00 UTC) অটো রান করবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # পুরো হিস্ট্রি ফেচ করবে যাতে গিট কনফ্লিক্ট না হয়

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4 requests

      - name: Run Scraper Script
        run: |
          python fib_github.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # ১. নতুন ফাইল গিট-এ অ্যাড করা
          git add latest_movies.m3u
          
          # ২. লোকাললি সেভ (Commit) করা, পরিবর্তন না থাকলে এরর দেবে না
          git commit -m "Auto-updated Fibwatch Latest Playlist" || exit 0
          
          # ৩. রিমোটের সাথে সিঙ্ক করা (অটো-স্ট্যাশ ব্যবহারের মাধ্যমে কনফ্লিক্ট এড়ানো)
          git pull origin main --rebase --autostash
          
          # ৪. সবশেষে পুশ করা
          git push origin main
