name: Auto Scraper

on:
  workflow_dispatch: # ম্যানুয়ালি রান করানোর বাটন
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২ টায় (UTC) অটো রান করবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4 requests

      - name: Run Scraper Script
        run: |
          python fib_github.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_movies.m3u
          git commit -m "Auto-updated Fibwatch Latest Playlist" || echo "No changes to commit"
          git push
