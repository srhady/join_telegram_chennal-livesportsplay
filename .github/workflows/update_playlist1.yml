name: Auto Scraper

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পরপর (00:00, 06:00, 12:00, 18:00 UTC) অটো রান করবে

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # পুরো হিস্ট্রি ফেচ করবে যাতে পুশ করতে সুবিধা হয়

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4 requests

      - name: Run Scraper Script
        run: |
          python fib_github.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # রিমোট রিপোজিটরির সাথে সিঙ্ক করার জন্য আগে পুল করে নেওয়া হচ্ছে
          git pull origin main --rebase
          
          git add latest_movies.m3u
          
          # যদি কোনো পরিবর্তন না থাকে তবে এরর দিবে না
          git commit -m "Auto-updated Fibwatch Latest Playlist" || exit 0
          
          git push origin main
