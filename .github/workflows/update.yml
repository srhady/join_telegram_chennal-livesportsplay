name: Generate Match Poster

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  create-poster:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 চেকআউট রিপোজিটরি
        uses: actions/checkout@v4

      - name: 🟢 Node.js সেটআপ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 ডিপেন্ডেন্সি ইনস্টল
        run: npm install puppeteer

      - name: 🚀 পোস্টার জেনারেট স্ক্রিপ্ট রান
        run: node poster.js

      - name: 💾 পোস্টার গিটহাবে পুশ করা
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add social_match_poster.png || true
          git commit -m "Auto Generate Match Poster with New Links" || exit 0
          git push
