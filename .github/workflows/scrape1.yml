name: Update Fibwatch Playlists

on:
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন বাংলাদেশ সময় সকাল ৬টায় রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      run: |
        python scraper.py  # এখানে আপনার পাইথন ফাইলের নামটা ঠিক আছে কি না দেখে নেবেন

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        # *.m3u দিলে সে playlist.m3u এবং bangla.m3u দুটোই একসাথে অ্যাড করে নেবে
        git add *.m3u
        git commit -m "Auto-update Fibwatch Playlists (Dual Engine)" || echo "No changes to commit"
        git push
